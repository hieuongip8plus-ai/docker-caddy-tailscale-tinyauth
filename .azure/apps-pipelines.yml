# =============================================================================
# .azure/apps-pipelines.yml — Azure Pipelines mirror of .github/workflows/apps.yml
# =============================================================================

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - "*"

pool:
  vmImage: ubuntu-latest

jobs:
  - job: apps
    displayName: "Validate and build apps"
    condition: and(succeeded(), ne(variables['ENABLE_APP_BUILDS'], 'false'))
    steps:
      - checkout: self
        displayName: "Checkout"

      - task: NodeTool@0
        inputs:
          versionSpec: "20.x"
        displayName: "Use Node 20"

      - script: npm ci
        displayName: "Install dependencies"

      - script: node scripts/addapp/validate-app.mjs
        displayName: "Validate apps"

      - script: |
          docker buildx create --use --name appbuilder || docker buildx use appbuilder
          docker buildx inspect --bootstrap
        displayName: "Set up Docker Buildx"

      - script: echo "No buildable apps registered"
        displayName: "No buildable apps"
