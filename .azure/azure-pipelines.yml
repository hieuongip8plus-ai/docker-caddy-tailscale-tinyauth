# =============================================================================
# .azure/azure-pipelines.yml — Azure Pipelines mirror of .github/workflows/test.yml
# =============================================================================

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - "*"

pool:
  vmImage: ubuntu-latest

variables:
  BUILDX_CACHE: $(Pipeline.Workspace)/.buildx-cache
  BUILDX_CACHE_NEW: $(Pipeline.Workspace)/.buildx-cache-new
  TEST_TIMEOUT: "180"
  KEEP_ALIVE_MINUTES: "5"
  KEEP_INTERVAL_SECONDS: "30"
  DOCKER_BUILD_SUMMARY: "false"
  DOCKER_BUILD_RECORD_UPLOAD: "false"

jobs:
  - job: smoke
    displayName: "Compose up + external access"
    timeoutInMinutes: 360
    condition: and(succeeded(), or(ne(variables['Build.Reason'], 'PullRequest'), eq(variables['System.PullRequest.IsFork'], 'False')))
    steps:
      - checkout: self
        displayName: "P1 Checkout"
        fetchDepth: 1

      - task: NodeTool@0
        inputs:
          versionSpec: "20.x"
        displayName: "P1 Setup Node"

      - task: Cache@2
        inputs:
          key: 'npm | "$(Agent.OS)" | package-lock.json | nodesync/package-lock.json | orchestrator/package-lock.json'
          path: $(Pipeline.Workspace)/.npm
          cacheHitVar: NPM_CACHE_RESTORED
        displayName: "P1 Setup Node cache"

      - task: Cache@2
        inputs:
          key: "runner-tools | $(Agent.OS) | scripts/runner-tools/tools-config.jsonc"
          path: scripts/runner-tools/.cache
          cacheHitVar: RUNNER_TOOLS_CACHE_RESTORED
        displayName: "Restore runner tools cache"

      - script: |
          echo "P1 start $(date -u +%FT%T.%3NZ)"
          npm ci --cache $(Pipeline.Workspace)/.npm --loglevel=error
          npm ci --prefix nodesync --omit=dev --cache $(Pipeline.Workspace)/.npm --loglevel=error
          npm ci --prefix orchestrator --omit=dev --cache $(Pipeline.Workspace)/.npm --loglevel=error
          node scripts/runner-tools/install-tool.mjs --all
          echo "P1 end $(date -u +%FT%T.%3NZ)"
        displayName: "P1 Install dependencies and tools"

      - script: |
          docker buildx create --use --name azbuilder || docker buildx use azbuilder
          docker buildx inspect --bootstrap
        displayName: "P2 Set up Docker Buildx"

      - task: Cache@2
        inputs:
          key: 'buildx | webssh | "$(Agent.OS)" | webssh/Dockerfile'
          path: $(BUILDX_CACHE)/webssh
        displayName: "P2 Cache buildx layers (webssh)"

      - task: Cache@2
        inputs:
          key: 'buildx | rclone | "$(Agent.OS)" | rclone/Dockerfile'
          path: $(BUILDX_CACHE)/rclone
        displayName: "P2 Cache buildx layers (rclone)"

      - task: Cache@2
        inputs:
          key: 'buildx | orchestrator | "$(Agent.OS)" | orchestrator/Dockerfile | orchestrator/package-lock.json'
          path: $(BUILDX_CACHE)/orchestrator
        displayName: "P2 Cache buildx layers (orchestrator)"

      - task: Cache@2
        inputs:
          key: 'buildx | nodesync | "$(Agent.OS)" | nodesync/Dockerfile | nodesync/package-lock.json'
          path: $(BUILDX_CACHE)/nodesync
        displayName: "P2 Cache buildx layers (nodesync)"

      - script: |
          echo "P2 bake start $(date -u +%FT%T.%3NZ)"
          mkdir -p ci-runtime
          mkdir -p $(BUILDX_CACHE_NEW)/webssh
          mkdir -p $(BUILDX_CACHE_NEW)/rclone
          mkdir -p $(BUILDX_CACHE_NEW)/orchestrator
          mkdir -p $(BUILDX_CACHE_NEW)/nodesync
          docker buildx bake \
            --file .github/workflows/docker-bake.hcl \
            --set "*.args.GIT_SHA=$(Build.SourceVersion)" \
            --set "webssh.cache-from=type=local,src=$(BUILDX_CACHE)/webssh" \
            --set "webssh.cache-to=type=local,dest=$(BUILDX_CACHE_NEW)/webssh,mode=max" \
            --set "rclone.cache-from=type=local,src=$(BUILDX_CACHE)/rclone" \
            --set "rclone.cache-to=type=local,dest=$(BUILDX_CACHE_NEW)/rclone,mode=max" \
            --set "orchestrator.cache-from=type=local,src=$(BUILDX_CACHE)/orchestrator" \
            --set "orchestrator.cache-to=type=local,dest=$(BUILDX_CACHE_NEW)/orchestrator,mode=max" \
            --set "nodesync.cache-from=type=local,src=$(BUILDX_CACHE)/nodesync" \
            --set "nodesync.cache-to=type=local,dest=$(BUILDX_CACHE_NEW)/nodesync,mode=max" \
            --metadata-file ci-runtime/bake-metadata.json \
            --load \
            default
          echo "P2 bake end $(date -u +%FT%T.%3NZ)"
          echo "--- images after bake ---"
          docker image ls --format "{{.Repository}}:{{.Tag}} ({{.ID}})" | grep -i proxy-stack || echo "NO proxy-stack images found!"
        displayName: "P2 Build images with BuildKit cache"
        env:
          BUILDX_BAKE_ENTITLEMENTS_FS: "0"

      - script: node scripts/runners/verify-stack-images.mjs
        displayName: "P2 Verify local images"
        env:
          GITHUB_SHA: $(Build.SourceVersion)

      - script: |
          rm -rf $(BUILDX_CACHE)
          mv $(BUILDX_CACHE_NEW) $(BUILDX_CACHE) 2>/dev/null || true
        displayName: "P2 Rotate buildx cache"
        condition: always()

      - script: |
          echo "P3 start $(date -u +%FT%T.%3NZ)"
          node scripts/runners/setup-env.mjs
          echo "P3 end $(date -u +%FT%T.%3NZ)"
        displayName: "P3 Setup environment"
        env:
          ENV_FILE: $(ENV_FILE)
          DOTENVRTDB_URL: $(DOTENVRTDB_URL)

      - script: |
          echo "P4 start $(date -u +%FT%T.%3NZ)"
          node scripts/runners/setup-host.mjs
          echo "P4 end $(date -u +%FT%T.%3NZ)"
        displayName: "P4 Setup Host"

      - script: |
          echo "P5 start $(date -u +%FT%T.%3NZ)"
          node scripts/runners/start-stack.mjs
          echo "P5 end $(date -u +%FT%T.%3NZ)"
        displayName: "P5 Start stack"

      - script: node scripts/wait-and-test.mjs
        displayName: "P6 Verify stack"
        env:
          TEST_TIMEOUT: $(TEST_TIMEOUT)

      - script: |
          if [ -f public-url.txt ]; then echo "Public URL: $(cat public-url.txt)"; fi
          docker compose ps || docker ps -a || true
        displayName: "Show public URL and status"
        condition: always()

      - script: node scripts/runners/keep-alive.mjs
        displayName: "P7 Keep-alive heartbeat"
        env:
          KEEP_MIN: $(KEEP_ALIVE_MINUTES)
          KEEP_INTERVAL_SECONDS: $(KEEP_INTERVAL_SECONDS)
        condition: and(succeeded(), ne(variables['KEEP_ALIVE_MINUTES'], '0'))

      - script: node scripts/runners/collect-logs.mjs
        displayName: "P8 Collect logs"
        condition: always()

      - script: node scripts/runners/analyze-workflow.mjs
        displayName: "P8 Analyze workflow"
        condition: always()

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: ci-logs
          artifact: "stack-logs-$(Build.BuildId)-$(System.JobAttempt)"
        displayName: "P8 Upload logs"
        condition: always()

      - script: |
          docker compose ps -a || docker ps -a || true
          docker compose logs --no-color --tail=200 || true
        displayName: "P8 Dump logs on failure"
        condition: failed()

      - script: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans || docker compose down -v --remove-orphans || true
        displayName: "P8 Tear down"
        condition: always()
