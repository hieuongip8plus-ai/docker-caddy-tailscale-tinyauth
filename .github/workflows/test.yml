name: stack-test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: "Keep the stack up after the smoke test passes (minutes, 0 = off)"
        required: false
        default: "5"
      keep_alive_interval:
        description: "Heartbeat log interval while kept alive (minutes)"
        required: false
        default: "5"

concurrency:
  group: stack-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Compose up + external access
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ── Cache ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: npm ci

      - name: Compute Docker cache key
        run: node scripts/runners/cache-docker-build-github.mjs env

      - name: Restore Docker image cache
        uses: actions/cache@v6
        with:
          path: ${{ env.DOCKER_CACHE_PATH }}
          key: ${{ env.DOCKER_CACHE_KEY }}
          restore-keys: |
            docker-images-

      - name: Load cached Docker images
        run: node scripts/runners/cache-docker-build-github.mjs restore

      # ── Environment ───────────────────────────────────────────────
      - name: Setup environment
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: node scripts/runners/setup-env.mjs

      # ── Stack ─────────────────────────────────────────────────────
      - name: Start stack
        run: node scripts/runners/start-stack.mjs

      - name: Save Docker images to cache
        if: always()
        run: node scripts/runners/cache-docker-build-github.mjs save

      # ── Verify ────────────────────────────────────────────────────
      - name: Wait and verify external access
        env:
          TEST_TIMEOUT: "180"
        run: node scripts/wait-and-test.mjs

      - name: Show public URL
        if: always()
        run: |
          if [ -f public-url.txt ]; then
            echo "Public URL: $(cat public-url.txt)"
            echo "PUBLIC_URL=$(cat public-url.txt)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "## Container status" >> "$GITHUB_STEP_SUMMARY"
          docker compose ps >> "$GITHUB_STEP_SUMMARY" 2>&1 || docker ps -a >> "$GITHUB_STEP_SUMMARY" 2>&1 || true

      # ── Keep-alive (manual runs) ──────────────────────────────────
      - name: Keep-alive heartbeat
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.keep_alive_minutes != '0'
        env:
          KEEP_MIN: ${{ github.event.inputs.keep_alive_minutes }}
          INTERVAL_MIN: ${{ github.event.inputs.keep_alive_interval }}
        run: |
          set -euo pipefail
          total=$(( KEEP_MIN * 60 ))
          step=$(( INTERVAL_MIN * 60 ))
          [ "$step" -le 0 ] && step=300
          elapsed=0
          url="$(cat public-url.txt 2>/dev/null || echo unknown)"
          echo "Keeping stack alive for ${KEEP_MIN}m, heartbeat every ${INTERVAL_MIN}m. URL: $url"
          while [ "$elapsed" -lt "$total" ]; do
            sleep "$step"
            elapsed=$(( elapsed + step ))
            echo "[heartbeat] $(date -u +%H:%M:%SZ) ${elapsed}/${total}s — $url"
            docker compose ps
          done

      # ── Teardown ──────────────────────────────────────────────────
      - name: Collect logs
        if: always()
        run: node scripts/runners/collect-logs.mjs

      - name: Analyze workflow run
        if: always()
        run: node scripts/runners/analyze-workflow.mjs

      - name: Analyze and report errors
        if: always()
        run: |
          mkdir -p ci-logs/analysis
          echo "# Workflow Error Analysis" > ci-logs/analysis/errors.md
          echo "" >> ci-logs/analysis/errors.md
          echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> ci-logs/analysis/errors.md
          echo "Run: $GITHUB_RUN_ID / Attempt: $GITHUB_RUN_ATTEMPT" >> ci-logs/analysis/errors.md
          echo "" >> ci-logs/analysis/errors.md
          
          # Check container status
          echo "## Container Status" >> ci-logs/analysis/errors.md
          echo '```' >> ci-logs/analysis/errors.md
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" >> ci-logs/analysis/errors.md 2>&1 || echo "docker ps failed" >> ci-logs/analysis/errors.md
          echo '```' >> ci-logs/analysis/errors.md
          echo "" >> ci-logs/analysis/errors.md
          
          # Scan logs for errors
          echo "## Errors Detected" >> ci-logs/analysis/errors.md
          echo "" >> ci-logs/analysis/errors.md
          
          ERROR_COUNT=0
          for svc in caddy tinyauth whoami cloudflared tailscale; do
            LOG="ci-logs/services/${svc}.log"
            [ -f "$LOG" ] || continue
            
            # Find errors in logs
            ERRORS=$(grep -i -n "error\|fatal\|panic\|exception\|failed\|crash" "$LOG" 2>/dev/null | head -20)
            if [ -n "$ERRORS" ]; then
              echo "### $svc" >> ci-logs/analysis/errors.md
              echo '```' >> ci-logs/analysis/errors.md
              echo "$ERRORS" >> ci-logs/analysis/errors.md
              echo '```' >> ci-logs/analysis/errors.md
              echo "" >> ci-logs/analysis/errors.md
              ERROR_COUNT=$((ERROR_COUNT + $(echo "$ERRORS" | wc -l)))
            fi
          done
          
          if [ "$ERROR_COUNT" -eq 0 ]; then
            echo "No errors found in logs." >> ci-logs/analysis/errors.md
          else
            echo "**Total errors found: $ERROR_COUNT**" >> ci-logs/analysis/errors.md
          fi
          echo "" >> ci-logs/analysis/errors.md
          
          # Check for specific failure patterns
          echo "## Failure Patterns" >> ci-logs/analysis/errors.md
          echo "" >> ci-logs/analysis/errors.md
          
          # Check TINYAUTH_AUTH_USERS error
          if grep -q "TINYAUTH_AUTH_USERS" ci-logs/all-services.log 2>/dev/null; then
            echo "- ❌ **TINYAUTH_AUTH_USERS missing** - Add to .env or use .env.ci fallback" >> ci-logs/analysis/errors.md
          fi
          
          # Check network issues
          if grep -qi "connection refused\|ECONNREFUSED\|network.*not found" ci-logs/all-services.log 2>/dev/null; then
            echo "- ❌ **Network connectivity issues** - Check Docker networks and service dependencies" >> ci-logs/analysis/errors.md
          fi
          
          # Check container crashes
          if docker ps -a --filter "status=exited" --format "{{.Names}}" 2>/dev/null | grep -q .; then
            echo "- ❌ **Containers exited** - Check container logs for crash details" >> ci-logs/analysis/errors.md
          fi
          
          echo "" >> ci-logs/analysis/errors.md
          
          # Recommendations
          echo "## Recommendations" >> ci-logs/analysis/errors.md
          echo "" >> ci-logs/analysis/errors.md
          echo "1. Download the \`stack-logs-*\` artifact" >> ci-logs/analysis/errors.md
          echo "2. Review \`analysis/errors.md\` for error summary" >> ci-logs/analysis/errors.md
          echo "3. Check per-service logs in \`services/\` directory" >> ci-logs/analysis/errors.md
          echo "4. Run \`node scripts/analyze-with-opencode.mjs\` locally for deeper analysis" >> ci-logs/analysis/errors.md
          
          # Also output to summary
          cat ci-logs/analysis/errors.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          
          echo "Analysis saved to ci-logs/analysis/errors.md"

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: stack-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-logs/
          if-no-files-found: warn
          retention-days: 14

      - name: Dump logs on failure
        if: failure()
        run: |
          # Fallback to .env.ci if .env missing or incomplete
          if [ ! -f .env ] || ! grep -q TINYAUTH_AUTH_USERS .env 2>/dev/null; then
            cp .env.ci .env 2>/dev/null || true
          fi
          docker compose ps -a || docker ps -a || true
          echo "===== all services (tail 200) ====="
          docker compose logs --no-color --tail=200 2>&1 || docker logs --tail=200 $(docker ps -aq) 2>&1 || true
          for svc in caddy tinyauth whoami cloudflared tailscale; do
            echo "===== $svc (tail 100) ====="
            docker compose logs --no-color --tail=100 "$svc" 2>&1 || docker logs --tail=100 "$svc" 2>&1 || true
          done

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v --remove-orphans || docker compose down -v --remove-orphans || true
